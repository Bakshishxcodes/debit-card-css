<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Debit card</title>
</head>
<body>
    <h1 class="mainlabel">A Premium Debit Card</h1>
    <div class="card">
        <div class="visalogo">
            <img src="visa-logo-black-and-white.webp" alt="">
        </div>
        <div class="chiplogo">
            <img src="chip-logo-black-and-white.png" alt="">
        </div>   
        <div class="cardnumber">
            <h3>5391   2320   7704   5009</h3>
        </div> 
        <div class="nfclogo">
            <img src="[CITYPNG.COM]White Contactless NFC Payment Icon PNG Image - 1000x1000.png" alt="">
        </div>
        <div class="premiumlogo">
            <h1>NOHARA BANK</h1>
        </div>
        <div class="holdername">
            <h1>Bakshish D.Nohara</h1>
        </div>
        <div class="validity">
            <h5 class="label">VALID THRU</h5>
            <h3 class="date">05/99</h3>
        </div>
    </div>
</body>
</html>
